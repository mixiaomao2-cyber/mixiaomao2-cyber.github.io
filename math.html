<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

<body>
  <div id="math_0000">
    <p>问一个问题: <math><mn>0.</mn><mover><mn>9</mn><mo>.</mo></mover></math>等不等于<math><mn>1</mn></math>?</p>
    <details>
      <summary>查看证明方式(这里只提供一种)</summary>
      <math display="block"><mtext>设</mtext><mi>x</mi><mo>=</mo><mn>0.</mn><mover><mn>9</mn><mo>.</mo></mover></math>
      <br>
      <math display="block"><mn>10</mn><mi>x</mi><mo>=</mo><mn>9.</mn><mover><mn>9</mn><mo>.</mo></mover></math>
      <br>
      <math display="block"><mn>10</mn><mi>x</mi><mo>-</mo><mi>x</mi><mo>=</mo><mn>9.</mn><mover><mn>9</mn><mo>.</mo></mover><mo>-</mo><mn>0.</mn><mover><mn>9</mn><mo>.</mo></mover></math>
      <br>
      <math display="block"><mn>9</mn><mi>x</mi><mo>=</mo><mn>9</mn></math>
      <br>
      <math display="block"><mi>x</mi><mo>=</mo><mn>1</mn></math>
      <p style="text-align: center;">因此 <math><mn>0.</mn><mover><mn>9</mn><mo>.</mo></mover><mo>=</mo><mn>1</mn></math> ,简洁明了</p>
    </details>
    <p>你猜对了吗?</p>
  </div>
  <div id="math_0001">
    <p>众所周知: <math><msqrt><mo>-</mo><mi>1</mi></msqrt><mo>=</mo><mi>i</mi></math></p>
    <p>但是,你知道吗?实际上<math><mi>i</mi></math>还可以表示旋转</p>
  </div>
  <div id="math_0002">
    <p>你知道吗?假如想让一个数a(任意位数),后面增加1位数k(0≤k≤9),假如这个数为x,则 x = 10a + k</p>
    <p>拓展:如果知道k的位数b,则x = 10<sup>b</sup>a + k</p>
  </div>
  <div id="math_0003">
    <p>1 + 2 + 3 + 4 + 5 + ...... + ∞ = <math><mo>-</mo><mfrac><mn>1</mn><mn>12</mn></mfrac></math></p>
    <p>是不是很神奇?</p>
  <div>
</body>
