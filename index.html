<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <title>咪小猫的网页</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="咪小猫的网页">
  <meta property="og:description" content="输入提取码即可查看富文本">
  <meta property="og:url" content="https://mixiaomao2-cyber.github.io/">
  <style>
    div {
      display: none;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background-color: black;
        color: white
      }
    }
  </style>
</head>

<body>
  <div id="0000">
    <p>Hello, world!!!</p>
  </div>
  <div id="math_0000">
    <p>问一个问题: <math><mn>0.</mn><mover><mn>9</mn><mo>.</mo></mover></math>等不等于<math><mn>1</mn></math>?</p>
    <details>
      <summary>查看证明方式(这里只提供一种)</summary>
      <math display="block">
        <mtext>设</mtext>
        <mi>x</mi>
        <mo>=</mo>
        <mn>0.</mn>
        <mover><mn>9</mn><mo>.</mo></mover>
      </math>
      <br>
      <math display="block">
          <mn>10</mn>
          <mi>x</mi>
          <mo>=</mo>
          <mn>9.</mn>
          <mover><mn>9</mn><mo>.</mo></mover>
      </math>
      <br>
      <math display="block">
          <mn>10</mn>
          <mi>x</mi>
          <mo>-</mo>
          <mi>x</mi>
          <mo>=</mo>
          <mn>9.</mn>
          <mover><mn>9</mn><mo>.</mo></mover>
          <mo>-</mo>
          <mn>0.</mn>
          <mover><mn>9</mn><mo>.</mo></mover>
      </math>
      <br>
      <math display="block">
          <mn>9</mn>
          <mi>x</mi>
          <mo>=</mo>
          <mn>9</mn>
      </math>
      <br>
      <math display="block">
          <mi>x</mi>
          <mo>=</mo>
          <mn>1</mn>
      </math>
      <p>因此 <math><mn>0.</mn><mover><mn>9</mn><mo>.</mo></mover><mo>=</mo><mn>1</mn></math> ,简洁明了</p>
    </details>
    <p>你猜对了吗?</p>
  </div>
  <div id="math_0001">
    <p>众所周知: <math><msqrt><mo>-</mo><mi>1</mi></msqrt><mo>=</mo><mi>i</mi></math></p>
    <p>但是,你知道吗?实际上<math><mi>i</mi></math>还可以表示旋转</p>
  </div>
  <div id="math_0002">
    <!-- No thing ... -->
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let user_key = prompt("请输入提取码:");
  
      if (user_key === null) {
        alert("已取消");
        } else {
          let doc = document.getElementById(user_key);
          if (doc) {
            doc.style.display = 'block';
          } else {
            alert("提取码错误");
          }
        }
    });
  </script>
</body>
</html>
