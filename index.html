<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <title>咪小猫的网页</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="咪小猫的网页">
  <meta property="og:description" content="输入提取码即可查看富文本">
  <meta property="og:url" content="https://mixiaomao2-cyber.github.io/">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <iframe id="content" src="about:blank" style="width:100vw;height:100vh;border:none;position:fixed;top:0;left:0;"></iframe>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const userKey = prompt("请输入提取码:");
      
      if (!userKey) {
        alert("已取消或输入为空");
        return;
      }
      
      const parts = userKey.split(' ');
      if (!parts[0] || !parts[1]) {
        alert("提取码错误");
        return;
      }
      
      const iframe = document.getElementById("content");
      if (!iframe) return;
      
      iframe.src = "${parts[0]}.html";
      iframe.style.display = "block";
      
      // 等待 iframe 加载完成
      iframe.onload = () => {
        try {
          const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          const targetElement = iframeDoc.getElementById(parts[1]);
            
          if (targetElement) {
            targetElement.style.display = "block";
            // 可选：隐藏其他不需要的内容
          } else {
            alert("未找到对应内容");
          }
        } catch (e) {
          // 跨域情况下会报错
          console.error("无法访问 iframe 内容:", e);
          alert("无法访问内容，可能存在跨域限制");
        }
      };
    });
  </script>
</body>
</html>
