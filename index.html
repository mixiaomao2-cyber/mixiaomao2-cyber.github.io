<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <title>Hello</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    div {
      display: none;
    }
  </style>
</head>

<body>
  <div id="0000">
    <p>Hello, world!!!</p>
  </div>
  <div id="0001">
    <p>咪小猫是good。</p>
  </div>
  <div id="0002">
    <p>You're bad.</p>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
    let user_key = prompt("请输入提取码:");
  
    if (user_key === null) {
      // 用户取消了
      alert("已取消");
    } else {
      let doc = document.getElementById(user_key);
      if (doc) {
        doc.style.display = 'block';  // 或 'flex' 等
      } else {
        alert("提取码错误");
      }
    }
  });
</script>
</body>
</html>
