<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <title>咪小猫的网页</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="咪小猫的网页">
  <meta property="og:description" content="输入提取码即可查看富文本">
  <meta property="og:url" content="https://mixiaomao2-cyber.github.io/">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <iframe id="content" src="about:blank"></iframe>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let user_key = prompt("请输入提取码:");
  
      if (user_key === null) {
        alert("已取消");
        } else {
          let iframe = document.getElementById("content");
          if (iframe) {
            if (user_key.split('_')[0] == "math") {
              iframe.src = "math.html";
              let iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
              let doc = iframeDoc.getElementById(user_key.split('_')[1]);
              if (doc) {
                doc.style.display = "blcok";
              }
            }
          } else {
            alert("提取码错误");
          }
        }
    });
  </script>
</body>
</html>
